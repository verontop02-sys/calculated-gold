# Blueprint: Render → New → Blueprint → подключить репозиторий.
#
# Build Command на сервисе должен быть ТОЛЬКО: npm install
# (не добавляй npm run build — фронт собирается для Firebase локально; иначе падает vite/rollup на Linux.)
#
# Секреты в Dashboard: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (legacy eyJ…),
# CORS_ORIGIN=https://gold-panel.web.app,https://gold-panel.firebaseapp.com
# Опционально: PANEL_FULL_ACCESS_EMAILS=you@gmail.com — полный доступ, если роль в profiles не читается
# Опционально: PRICE_SOURCE=auto (Мосбиржа GLDRUBF, резерв ЦБ), moex, cbr
services:
  - type: web
    name: gold-calculated-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
